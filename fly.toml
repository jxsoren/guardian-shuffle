# fly.toml app configuration file generated for guardian-shuffle-app on 2026-06-13T04:47:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'guardian-shuffle-app'
primary_region = 'sjc'

[build]
  dockerfile = 'Dockerfile'

[env]
  LISTEN_ADDR = ':8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
