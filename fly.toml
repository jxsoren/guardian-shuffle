app = "guardian-shuffle-app"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

# Guardian Shuffle is a background service: the poller runs every 30s and the
# scheduler every minute, so the machine must stay always-on (no scale-to-zero).
[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "10s"
interval = "15s"
method = "GET"
path = "/health"
timeout = "5s"

[env]
LISTEN_ADDR = ":8080"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
